<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Assignment with Buttons</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        .section {
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid #ccc;
            width: 400px;
        }
        input {
            margin: 5px 0;
            padding: 5px;
            width: 90%;
        }
        button {
            margin-top: 10px;
            padding: 6px 10px;
            cursor: pointer;
        }
        h3 {
            color: darkblue;
        }
    </style>
</head>
<body>

<h2>JavaScript Assignment with Buttons</h2>

<!-- Question 1 -->
<div class="section">
    <h3>1. Even Numbers from 1 to 100</h3>
    <button onclick="showEven()">Show Even Numbers</button>
    <p id="evenResult"></p>
</div>

<!-- Question 2 -->
<div class="section">
    <h3>2. Calculator</h3>
    <input type="number" id="num1" placeholder="Enter First Number">
    <input type="number" id="num2" placeholder="Enter Second Number">
    <input type="text" id="operator" placeholder="Enter Operator (+ - * /)">
    <button onclick="calculate()">Calculate</button>
    <p id="calcResult"></p>
</div>

<!-- Question 3 -->
<div class="section">
    <h3>3. Tax Calculator</h3>
    <input type="number" id="salary" placeholder="Enter Salary">
    <button onclick="findTax()">Calculate Tax</button>
    <p id="taxResult"></p>
</div>

<!-- Question 4 -->
<div class="section">
    <h3>4. Sum of Products of Digits</h3>
    <input type="number" id="n1" placeholder="Enter First Number">
    <input type="number" id="n2" placeholder="Enter Second Number">
    <button onclick="sumOfProduct()">Calculate</button>
    <p id="productResult"></p>
</div>

<script>

// Question 1
function showEven() {
    let output = "";
    for (let i = 1; i <= 100; i++) {
        if (i % 2 === 0) {
            output += i + " ";
        }
    }
    document.getElementById("evenResult").innerHTML = output;
}


// Question 2
function calculate() {
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let operator = document.getElementById("operator").value;
    let result;

    switch (operator) {
        case "+":
            result = num1 + num2;
            break;
        case "-":
            result = num1 - num2;
            break;
        case "*":
            result = num1 * num2;
            break;
        case "/":
            result = num2 !== 0 ? num1 / num2 : "Cannot divide by zero";
            break;
        default:
            result = "Invalid Operator";
    }

    document.getElementById("calcResult").innerHTML = "Result: " + result;
}


// Question 3
function findTax() {
    let salary = parseFloat(document.getElementById("salary").value);
    let tax = 0;

    switch (true) {
        case (salary > 0 && salary <= 500000):
            tax = 0;
            break;
        case (salary > 500000 && salary <= 1000000):
            tax = salary * 0.10;
            break;
        case (salary > 1000000 && salary <= 1500000):
            tax = salary * 0.20;
            break;
        case (salary > 1500000):
            tax = salary * 0.30;
            break;
        default:
            tax = "Invalid Salary";
    }

    document.getElementById("taxResult").innerHTML = "Tax: " + tax;
}


// Question 4
function sumOfProduct() {
    let n1 = parseInt(document.getElementById("n1").value);
    let n2 = parseInt(document.getElementById("n2").value);
    let sum = 0;

    while (n1 > 0 || n2 > 0) {
        let digit1 = n1 % 10;
        let digit2 = n2 % 10;

        sum += digit1 * digit2;

        n1 = Math.floor(n1 / 10);
        n2 = Math.floor(n2 / 10);
    }

    document.getElementById("productResult").innerHTML =
        "Sum of Products: " + sum;
}

</script>

</body>
</html>
