<!DOCTYPE html>
<html>
<head>
    <title>DOM Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            transition: 0.3s;
        }

        /* Dark Theme */
        .dark-mode {
            background-color: #121212;
            color: white;
        }

        button {
            padding: 8px 14px;
            margin: 8px 0;
            cursor: pointer;
        }

        /* Dynamic Div */
        .dynamic-div {
            background: lightblue;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
        }

        /* Hide Paragraph */
        .hidden {
            display: none;
        }

        /* Dynamic CSS Box */
        #box {
            margin-top: 20px;
            padding: 20px;
            background: lightgray;
            width: 220px;
            text-align: center;
            border-radius: 6px;
            transition: 0.3s;
        }

        .box-style {
            background: purple;
            color: white;
            transform: scale(1.05);
        }

    </style>
</head>
<body>

<h2> JS DOM </h2>

<!-- Dark Theme -->
<button id="themeBtn">Toggle Dark Mode</button>

<hr>

<!-- Div Creation -->
<button id="createBtn">Create Div</button>
<div id="container"></div>

<hr>

<!-- Hide / Show Paragraph -->
<p id="para">This paragraph can be hidden or shown.</p>
<button id="toggleParaBtn">Hide / Show Paragraph</button>

<hr>

<!-- Dynamic CSS -->
<div id="box">Styled Box</div>
<button id="styleBtn">Toggle Box Style</button>

<script>

// 1️⃣ Dark Theme
document.getElementById("themeBtn")
.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
});


// 2️⃣ Dynamic Div Creation
document.getElementById("createBtn")
.addEventListener("click", () => {

    const div = document.createElement("div");
    div.classList.add("dynamic-div");
    div.textContent = "New Div Created";

    document.getElementById("container")
    .appendChild(div);

});


// 3️⃣ Hide / Show Paragraph
document.getElementById("toggleParaBtn")
.addEventListener("click", () => {

    document.getElementById("para")
    .classList.toggle("hidden");

});


// 4️⃣ Dynamic CSS Toggle
document.getElementById("styleBtn")
.addEventListener("click", () => {

    document.getElementById("box")
    .classList.toggle("box-style");

});

</script>

</body>
</html>
